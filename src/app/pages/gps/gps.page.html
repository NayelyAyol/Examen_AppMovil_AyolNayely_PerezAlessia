<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title class="main-title">Mi Ubicación GPS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content ion-padding">

  @if (latitude() !== null && longitude() !== null) {
    <ion-card class="game-card">
      <div class="card-image-wrapper" style="height: 10px; background: #7c3aed;">
        </div>
      
      <ion-card-content class="card-body">
        <h2 class="game-title" style="margin-bottom: 16px;">Coordenadas Actuales</h2>
        
        <div class="meta-row" style="margin-bottom: 20px;">
          <div class="meta-item">
            <span class="meta-label">Latitud</span>
            <span class="meta-value" style="font-family: monospace; color: #4c1d95; font-size: 1.05rem;">
              {{ latitude() }}
            </span>
          </div>

          <div class="meta-item">
            <span class="meta-label">Longitud</span>
            <span class="meta-value" style="font-family: monospace; color: #4c1d95; font-size: 1.05rem;">
              {{ longitude() }}
            </span>
          </div>
        </div>

        @if (mapsUrl()) {
          <ion-button expand="block" class="btn-edit" style="--background: #10b981; margin: 0;" (click)="abrirGoogleMaps()">
            <ion-icon slot="start" name="map-outline"></ion-icon>
            Abrir en Google Maps
          </ion-button>
        }
      </ion-card-content>
    </ion-card>
  }

  @if (errorMsg()) {
    <div class="error-msg-container" style="color: #b91c1c; background: #fef2f2; padding: 12px; border-radius: 14px; margin-bottom: 16px; font-weight: 600; text-align: center; border: 1px solid #fee2e2;">
      ⚠️ {{ errorMsg() }}
    </div>
  }

  <div class="action-buttons-panel" style="margin-top: 20px;">
    
    <ion-button expand="block" class="btn-edit" style="margin-bottom: 12px;" (click)="obtenerUbicacionActual()">
      <ion-icon slot="start" name="locate-outline"></ion-icon>
      Obtener ubicación actual
    </ion-button>

    <ion-button expand="block" class="btn-edit" style="--background: #7c3aed; margin-bottom: 12px;" (click)="iniciarSeguimiento()" [disabled]="watchId !== null">
      <ion-icon slot="start" name="play-outline"></ion-icon>
      Iniciar seguimiento
    </ion-button>

    <ion-button expand="block" class="btn-delete" style="margin-bottom: 12px;" (click)="detenerSeguimiento()" [disabled]="watchId === null">
      <ion-icon slot="start" name="stop-outline"></ion-icon>
      Detener seguimiento
    </ion-button>

  </div>

</ion-content>
