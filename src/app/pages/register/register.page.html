<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title class="main-title">Crear Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content ion-padding">

  <div class="login-container">

    <div class="login-brand">
      <div class="logo-circle-login">♪</div>
      <h2>Registrarse</h2>
      <p>Completa tus datos para empezar</p>
    </div>

    <div class="form-card">

      <div class="fields-row">
        <ion-item class="field-item half">
          <ion-input 
            label="Nombre" 
            labelPlacement="stacked" 
            class="field-input" 
            type="text" 
            placeholder="Juan"
            [(ngModel)]="nombre">
          </ion-input>
        </ion-item>

        <ion-item class="field-item half">
          <ion-input 
            label="Apellido" 
            labelPlacement="stacked" 
            class="field-input" 
            type="text" 
            placeholder="Pérez"
            [(ngModel)]="apellido">
          </ion-input>
        </ion-item>
      </div>

      <ion-item class="field-item">
        <ion-input 
          label="Correo Electrónico" 
          labelPlacement="stacked" 
          class="field-input" 
          type="email" 
          placeholder="ejemplo@correo.com"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>

      <ion-item class="field-item">
        <ion-input 
          label="Contraseña" 
          labelPlacement="stacked" 
          class="field-input" 
          type="password" 
          placeholder="Mínimo 6 caracteres"
          [(ngModel)]="password">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-button class="btn-save" expand="block" (click)="register()">
        Registrarse
      </ion-button>

      <ion-button class="btn-register" expand="block" fill="clear" (click)="goToLogin()">
        ¿Ya tienes cuenta? Inicia sesión
      </ion-button>

    </div>

  </div>

</ion-content>
