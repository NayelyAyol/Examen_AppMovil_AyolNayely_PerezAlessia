<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title class="main-title">Buscador de Música</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-searchbar 
    placeholder="Busca tu artista o canción favorita..." 
    animated="true"
    [(ngModel)]="terminoBusqueda"
    (ionInput)="buscarMusica(terminoBusqueda)">
  </ion-searchbar>

  <div *ngIf="cargando" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Buscando en la colección de iTunes...</p>
  </div>

  <ion-list *ngIf="!cargando">
    <ion-item *ngFor="let cancion of listaCanciones" class="ion-margin-bottom">
      
      <ion-avatar slot="start">
        <img [src]="cancion.artworkUrl100" alt="Portada de {{cancion.collectionName}}" />
      </ion-avatar>

      <ion-label>
        <h2><strong>{{ cancion.trackName }}</strong></h2>
        <p>{{ cancion.artistName }}</p>
        <p style="font-size: 0.8em; color: gray;">Álbum: {{ cancion.collectionName }}</p>
      </ion-label>

      <audio slot="end" controls style="max-width: 120px; height: 32px;">
        <source [src]="cancion.previewUrl" type="audio/mp4">
        Tu navegador no soporta audio.
      </audio>

    </ion-item>
  </ion-list>

  <div *ngIf="listaCanciones.length === 0 && !cargando" class="ion-text-center ion-padding">
    <p>No se encontraron canciones. ¡Intenta buscar otra cosa! 🎧</p>
  </div>

</ion-content>
