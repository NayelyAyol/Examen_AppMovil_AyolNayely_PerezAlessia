<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title class="main-title">
      {{ id ? 'Editar Canción' : 'Nueva Canción' }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content ion-padding">

  <div class="preview-card">

    <img [src]="previewImagen || cancion.imagen_url || 'assets/icon/image.png'" (error)="imagenError($event)"
      alt="preview" class="preview-img" />

    <div class="overlay">
      <h2>{{ cancion.titulo || '......' }}</h2>
    </div>

  </div>

  <div class="form-card">

    <ion-item class="field-item">

      <ion-label position="stacked" class="field-label">

        Título

      </ion-label>

      <ion-input class="field-input" [(ngModel)]="cancion.titulo">

      </ion-input>

    </ion-item>

    <ion-item class="field-item">

      <ion-label position="stacked" class="field-label">

        Artista

      </ion-label>

      <ion-input class="field-input" [(ngModel)]="cancion.artista">

      </ion-input>

    </ion-item>

    <div class="fields-row">

      <ion-item class="field-item half">

        <ion-label position="stacked" class="field-label">

          Ranking

        </ion-label>

        <ion-input class="field-input" type="number" min="0" [(ngModel)]="cancion.ranking">

        </ion-input>

      </ion-item>

      <ion-item class="field-item half">

        <ion-label position="stacked" class="field-label">

          Año

        </ion-label>

        <ion-input class="field-input" type="number" min="0" [(ngModel)]="cancion.anio">

        </ion-input>

      </ion-item>

    </div>

    <ion-item class="field-item">

      <ion-label position="stacked" class="field-label">

        Categoría

      </ion-label>

      <ion-input class="field-input" [(ngModel)]="cancion.categorias">

      </ion-input>

    </ion-item>

    <ion-item class="field-item file-item">

      <ion-label position="stacked" class="field-label">
        Imagen
      </ion-label>

      <ion-button class="btn-upload" (click)="fileImage.click()">
        Subir imagen
      </ion-button>

      <input #fileImage type="file" accept="image/*" hidden (change)="subirImagen($event)" />

    </ion-item>

    <ion-item class="field-item">

      <ion-label position="stacked" class="field-label">

        Video

      </ion-label>

      <ion-input class="field-input" [(ngModel)]="cancion.video_url">

      </ion-input>

    </ion-item>

    <ion-item class="field-item file-item">

      <ion-label position="stacked" class="field-label">
        Audio
      </ion-label>

      <p *ngIf="audioSubido" class="audio-ok">
        ✔ Audio cargado correctamente
      </p>

      <audio *ngIf="cancion.audio_url" controls class="audio-player">
        <source [src]="cancion.audio_url" type="audio/mp3">
      </audio>

      <ion-button class="btn-upload" (click)="fileAudio.click()">
        Subir audio
      </ion-button>

      <input #fileAudio type="file" accept="audio/*" hidden (change)="subirAudio($event)" />

    </ion-item>

    <ion-button class="btn-save" expand="block" [disabled]="cancion.ranking < 0 || cancion.anio < 0"
      (click)="guardar()">

      Guardar

    </ion-button>

  </div>

</ion-content>
